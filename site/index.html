<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.bank.in Security Scorecard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:system-ui,sans-serif}</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
<nav class="border-b border-zinc-800 px-6 py-4 flex items-center gap-4">
  <h1 class="text-lg font-bold">🔒 .bank.in Security Scorecard</h1>
  <span class="text-sm text-zinc-500">by CashlessConsumer</span>
  <a href="/about.html" class="ml-auto text-sm text-amber-500 hover:text-amber-400">About &amp; Rubric</a>
</nav>
<main class="max-w-7xl mx-auto px-6 py-8">
<div id="stats" class="grid grid-cols-6 gap-3 mb-8"></div>
<div id="grades" class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8"></div>
<input type="text" id="search" placeholder="Search domains, banks, or types..." class="w-full bg-zinc-900 border border-zinc-700 rounded px-4 py-2 mb-4 text-sm">
<div class="text-xs text-zinc-500 mb-2"><span id="resultCount">0</span> of <span id="totalCount">0</span> domains</div>
<div class="overflow-x-auto rounded-lg border border-zinc-800">
<table class="w-full text-sm">
<thead><tr class="text-left text-zinc-400 text-xs uppercase bg-zinc-900">
  <th class="py-2 px-3 cursor-pointer hover:text-zinc-200" onclick="sortBy='domain';render()">Domain ↕</th>
  <th class="py-2 px-3 cursor-pointer hover:text-zinc-200" onclick="sortBy='score';render()">Score ↕</th>
  <th class="py-2 px-3 cursor-pointer hover:text-zinc-200" onclick="sortBy='https';render()">HTTPS ↕</th>
  <th class="py-2 px-3 cursor-pointer hover:text-zinc-200" onclick="sortBy='hsts';render()">HSTS ↕</th>
  <th class="py-2 px-3 cursor-pointer hover:text-zinc-200" onclick="sortBy='dnssec';render()">DNSSEC ↕</th>
  <th class="py-2 px-3">DMARC</th>
  <th class="py-2 px-3">Type</th>
  <th class="py-2 px-3">Status</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</main>
<script>
let data = [];
let sortBy = 'score';
let sortAsc = true;

function grade(score) {
  if (score >= 80) return 'A';
  if (score >= 60) return 'B';
  if (score >= 40) return 'C';
  if (score >= 20) return 'D';
  return 'F';
}

function gradeColor(grade) {
  return {A:'emerald',B:'green',C:'amber',D:'orange',F:'red'}[grade]||'zinc';
}

fetch('data/scorecard.json').then(r=>r.json()).then(d=>{
  data = d;
  document.getElementById('totalCount').textContent = data.length;
  render();
});

function render() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let filtered = data;
  if (q) {
    filtered = data.filter(d =>
      d.domain.includes(q) ||
      (d.bank_name||'').toLowerCase().includes(q) ||
      (d.bank_type||'').toLowerCase().includes(q) ||
      (d.dicgc_category||'').toLowerCase().includes(q)
    );
  }

  // Sort
  filtered.sort((a,b)=>{
    let va = a[sortBy] ?? (a.bank_name||''), vb = b[sortBy] ?? (b.bank_name||'');
    if (typeof va === 'boolean') return sortAsc ? (va===vb?0:va?1:-1) : (va===vb?0:va?-1:1);
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va-vb : vb-va;
  });

  document.getElementById('resultCount').textContent = filtered.length;

  // Stats
  const total = data.length;
  const avg = (data.reduce((s,d)=>s+d.score,0)/Math.max(total,1)).toFixed(1);
  const https = data.filter(d=>d.https).length;
  const hsts = data.filter(d=>d.hsts).length;
  const dnssec = data.filter(d=>d.dnssec).length;
  const dmarcReject = data.filter(d=>d.dmarc_policy==='reject').length;

  document.getElementById('stats').innerHTML =
    `<div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${total}</div><div class="text-xs text-zinc-400 mt-1">Total Domains</div></div>
     <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${avg}</div><div class="text-xs text-zinc-400 mt-1">Avg Score</div></div>
     <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${https}</div><div class="text-xs text-zinc-400 mt-1">HTTPS</div></div>
     <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${hsts}</div><div class="text-xs text-zinc-400 mt-1">HSTS</div></div>
     <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${dnssec}</div><div class="text-xs text-zinc-400 mt-1">DNSSEC</div></div>
     <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800 text-center"><div class="text-2xl font-bold">${dmarcReject}</div><div class="text-xs text-zinc-400 mt-1">DMARC Reject</div></div>`;

  // Grade distribution
  const grades = {A:{n:0},B:{n:0},C:{n:0},D:{n:0},F:{n:0}};
  data.forEach(d=>{grades[grade(d.score)].n++});
  document.getElementById('grades').innerHTML =
    `<div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800">
      <h2 class="text-sm font-semibold text-zinc-400 mb-3 uppercase tracking-wide">Grade Distribution</h2>
      <div class="space-y-2">${Object.entries(grades).map(([g,{n}]) =>
        `<div class="flex items-center gap-2"><span class="w-4 font-bold text-${gradeColor(g)}-${g==='C'?500:400}">${g}</span><div class="flex-1 h-5 bg-zinc-800 rounded overflow-hidden"><div class="bg-${gradeColor(g)}-500 h-full rounded" style="width:${(n/Math.max(total,1)*100)}%"></div></div><span class="w-12 text-right text-sm">${n}</span></div>`
      ).join('')}</div></div>
    <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800">
      <h2 class="text-sm font-semibold text-zinc-400 mb-3 uppercase tracking-wide">Red Flags</h2>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span>Git Exposure</span><span class="font-bold text-red-400">${data.filter(d=>d.git_exposed).length}</span></div>
        <div class="flex justify-between"><span>cPanel Detected</span><span class="font-bold text-orange-400">${data.filter(d=>d.cpanel_detected).length}</span></div>
        <div class="flex justify-between"><span>Admin Panels Public</span><span class="font-bold text-amber-400">${data.filter(d=>d.admin_panel_detected).length}</span></div>
      </div>
    </div>`;

  // Table
  const c = (ok) => ok ? '<span class="text-green-500">✓</span>' : '<span class="text-zinc-700">✗</span>';
  document.getElementById('tbody').innerHTML = filtered.map(d =>
    `<tr class="border-b border-zinc-800 hover:bg-zinc-900">
      <td class="py-2 px-3"><a href="/domains/${d.domain}.html" class="font-mono text-sm text-zinc-200 hover:text-emerald-400 underline underline-offset-2 decoration-zinc-700 hover:decoration-emerald-400 transition-colors">${d.domain}</a>${d.bank_name ? `<br><span class="text-[10px] text-zinc-600">${d.bank_name}</span>` : ''}</td>
      <td class="py-2 px-3"><a href="/domains/${d.domain}.html" class="font-bold ${d.score<20?'text-red-400':d.score<40?'text-orange-400':d.score<60?'text-amber-400':'text-green-400'} hover:underline">${d.score} ${grade(d.score)}</a></td>
      <td class="py-2 px-3 text-xs">${c(d.https)}</td>
      <td class="py-2 px-3 text-xs">${c(d.hsts)}</td>
      <td class="py-2 px-3 text-xs">${c(d.dnssec)}</td>
      <td class="py-2 px-3 text-xs">${d.dmarc_policy ? {reject:'✓ reject',quarantine:'! quarantine'}[d.dmarc_policy]||d.dmarc_policy : '—'}</td>
      <td class="py-2 px-3 text-xs text-zinc-500">${d.bank_type||'—'}</td>
      <td class="py-2 px-3 text-xs ${d.http_status===200?'text-green-500':d.http_status===0?'text-zinc-700':'text-zinc-500'}">${d.http_status||'—'}</td>
    </tr>`
  ).join('');
}

document.getElementById('search').addEventListener('input', render);
</script>
</body>
</html>
